<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello Seph Commerce Cloud</title>
</head>
<body>
  <p>This is a simple test for Sephora Comerce CLoud Agent</p>
	<ul>
		<li><p>v1.3 Session_Vars_Test</p></li>
		<ul>
			<li><p>SFRAAuthToken as Hidden Variable "Token1234567890" </p></li>
			<li><p>CCSessionToken as Hidden Variable "nada" initially </p></li>
			<li><p>Adding button and context update "Re-TokenABCDEFGH" </p></li>
		</ul>
	</ul>

<button type="button" onclick="updateContextToken()">Update Post-Chat Token</button>
	
	<script type='text/javascript'>
	function initEmbeddedMessaging() {
		try {
			embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'

			embeddedservice_bootstrap.init(
				'00DKE000000LOhQ',
				'Session_Vars_Test',
				'https://beautynet--aforce.sandbox.my.site.com/ESWSessionVarsTest1780993118592',
				{
					scrt2URL: 'https://beautynet--aforce.sandbox.my.salesforce-scrt.com'
				}
			);
		} catch (err) {
			console.error('Error loading Embedded Messaging: ', err);
		}
	};


	//Passing Web Context to Prechat - BEGIN  
    window.addEventListener("onEmbeddedMessagingReady", e => {
        console.log("onEmbeddedMessagingReady event triggered");  //log event
        
        //Set invisible prechat field
        embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({ 
			"SFRAAuthToken" : "Token1234567890", 
			"CCSessionToken" : "nada"  
		});		//for new hidden variables, add with a comma

	});
    //Passing Web Context to Prechat - END

	//Passing Web Context to Post-Chat - BEGIN  
	// FIX: Updated method to dynamically change context variables
	function updateContextToken() {
		console.log("Attempting to update SFRAAuthToken...");
		try {
			// Check if the modern site API structure is available
			if (embeddedservice_bootstrap.siteAPI && typeof embeddedservice_bootstrap.siteAPI.setContextParameters === "function") {
				embeddedservice_bootstrap.siteAPI.setContextParameters({
					"SFRAAuthToken": "Re-TokenABCDEFGH"
				});
				console.log("Context updated via siteAPI.");
			} 
			// Fallback: Directly updating the settings object (often picked up on deployment state changes)
			else {
				embeddedservice_bootstrap.settings.context = {
					"SFRAAuthToken": "Re-TokenABCDEFGH"
				};
				console.log("Context updated via settings fallback. Note: This applies to subsequent conversations/events.");
			}
		} catch (err) {
			console.error("Failed to update context variables: ", err);
		}
	}
	//Passing Web Context to Postchat - END  


	</script>
	<script type='text/javascript' src='https://beautynet--aforce.sandbox.my.site.com/ESWSessionVarsTest1780993118592/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>


</body>
</html>
